[settings]
mouse_follows_focus = false
focus_follows_mouse = false
hot_reload = true
default_disable = false
run_on_start = ["sketchybar"]

[settings.layout]
mode = "traditional"

[settings.layout.gaps]
outer.top = 60
outer.left = 15
outer.right = 15
outer.bottom = 15
inner.horizontal = 15
inner.vertical = 15

[settings.gestures]
enabled = false

[virtual_workspaces]
enabled = true
default_workspace_count = 35
default_workspace = 1
workspace_auto_back_and_forth = false
preserve_focus_per_workspace = true
# a=10 b=11 c=12 d=13 e=14 f=15 g=16 h=17 i=18 j=19 k=20 l=21 m=22 n=23 o=24 p=25 q=26 r=27 s=28 t=29 u=30 v=31 w=32 x=33 y=34 z=35
workspace_names = ["1","2","3","4","5","6","7","8","9","a","b","c","d","e","f","g","h","i","j","k","l","m","n","o","p","q","r","s","t","u","v","w","x","y","z"]

app_rules = [
  { app_id = "com.apple.Safari", title_regex = "Bitwarden", floating = true },
  { app_id = "com.spotify.client",        workspace = 22 },
  { app_id = "com.apple.ActivityMonitor", workspace = 26 },
  { app_id = "com.apple.iCal",            workspace = 12 },
  { app_id = "us.zoom.xos",               workspace = 35 },
  { app_id = "com.tinyspeck.slackmacgap", workspace = 28 },
  { app_id = "com.docker.docker",         workspace = 13 },
  { app_id = "com.apple.MobileSMS",       workspace = 29 },
  { app_name = "Discord",                 workspace = 13 },
]

[modifier_combinations]
alt-s = "Alt + Shift"
alt-c = "Alt + Control"

[keys]
"Alt + H" = { move_focus = "left" }
"Alt + J" = { move_focus = "up" }
"Alt + K" = { move_focus = "down" }
"Alt + L" = { move_focus = "right" }

"alt-s + H" = { move_node = "left" }
"alt-s + J" = { move_node = "up" }
"alt-s + K" = { move_node = "down" }
"alt-s + L" = { move_node = "right" }

"Alt + Minus" = "resize_window_shrink"
"Alt + Equal" = "resize_window_grow"

"Alt + Slash" = "toggle_orientation"

"alt-s + F" = "toggle_fullscreen_within_gaps"

"alt-s + T" = "toggle_window_floating"

"Alt + 1" = { switch_to_workspace = 1 }
"Alt + 2" = { switch_to_workspace = 2 }
"Alt + 3" = { switch_to_workspace = 3 }
"Alt + 4" = { switch_to_workspace = 4 }
"Alt + 5" = { switch_to_workspace = 5 }
"Alt + 6" = { switch_to_workspace = 6 }
"Alt + 7" = { switch_to_workspace = 7 }
"Alt + 8" = { switch_to_workspace = 8 }
"Alt + 9" = { switch_to_workspace = 9 }

"alt-s + 1" = { move_window_to_workspace = 1 }
"alt-s + 2" = { move_window_to_workspace = 2 }
"alt-s + 3" = { move_window_to_workspace = 3 }
"alt-s + 4" = { move_window_to_workspace = 4 }
"alt-s + 5" = { move_window_to_workspace = 5 }
"alt-s + 6" = { move_window_to_workspace = 6 }
"alt-s + 7" = { move_window_to_workspace = 7 }
"alt-s + 8" = { move_window_to_workspace = 8 }
"alt-s + 9" = { move_window_to_workspace = 9 }

"Alt + Tab" = "switch_to_last_workspace"

# lettered workspaces (skipping H/J/K/L/Z — conflict with focus/toggle bindings)
"Alt + A" = { switch_to_workspace = 10 }
"Alt + B" = { switch_to_workspace = 11 }
"Alt + C" = { switch_to_workspace = 12 }
"Alt + D" = { switch_to_workspace = 13 }
"Alt + E" = { switch_to_workspace = 14 }
"Alt + F" = { switch_to_workspace = 15 }
"Alt + G" = { switch_to_workspace = 16 }
"Alt + I" = { switch_to_workspace = 18 }
"Alt + M" = { switch_to_workspace = 22 }
"Alt + N" = { switch_to_workspace = 23 }
"Alt + O" = { switch_to_workspace = 24 }
"Alt + P" = { switch_to_workspace = 25 }
"Alt + Q" = { switch_to_workspace = 26 }
"Alt + R" = { switch_to_workspace = 27 }
"Alt + S" = { switch_to_workspace = 28 }
"Alt + T" = { switch_to_workspace = 29 }
"Alt + U" = { switch_to_workspace = 30 }
"Alt + V" = { switch_to_workspace = 31 }
"Alt + W" = { switch_to_workspace = 32 }
"Alt + X" = { switch_to_workspace = 33 }
"Alt + Y" = { switch_to_workspace = 34 }

# move window to lettered workspaces (skipping H/J/K/L/F/T — conflict with node/fullscreen/float bindings)
"alt-s + A" = { move_window_to_workspace = 10 }
"alt-s + B" = { move_window_to_workspace = 11 }
"alt-s + C" = { move_window_to_workspace = 12 }
"alt-s + D" = { move_window_to_workspace = 13 }
"alt-s + E" = { move_window_to_workspace = 14 }
"alt-s + G" = { move_window_to_workspace = 16 }
"alt-s + I" = { move_window_to_workspace = 18 }
"alt-s + M" = { move_window_to_workspace = 22 }
"alt-s + N" = { move_window_to_workspace = 23 }
"alt-s + O" = { move_window_to_workspace = 24 }
"alt-s + P" = { move_window_to_workspace = 25 }
"alt-s + Q" = { move_window_to_workspace = 26 }
"alt-s + R" = { move_window_to_workspace = 27 }
"alt-s + S" = { move_window_to_workspace = 28 }
"alt-s + U" = { move_window_to_workspace = 30 }
"alt-s + V" = { move_window_to_workspace = 31 }
"alt-s + W" = { move_window_to_workspace = 32 }
"alt-s + X" = { move_window_to_workspace = 33 }
"alt-s + Y" = { move_window_to_workspace = 34 }
"alt-s + Z" = { move_window_to_workspace = 35 }

# shortcuts
"alt-c + T" = { exec = "/Applications/Ghostty.app/Contents/MacOS/ghostty" }
"alt-c + S" = { exec = ["/bin/sh", "-c", "osascript -e 'tell application \"Safari\" to make new document at end of documents' -e 'tell application \"Safari\" to activate'"] }
"alt-c + C" = { exec = ["/bin/sh", "-c", "osascript -e 'tell application \"/Applications/Helium.app\" to make new window' -e 'tell application \"/Applications/Helium.app\" to activate'"] }

"Alt + Z" = "toggle_space_activated"
